<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>molocha ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0a0a0a, #000);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Texto */
.text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 65%;
  color: white;
  font-size: 42px;
  font-weight: bold;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px red; }
  to { text-shadow: 0 0 20px pink; }
}

/* Corazón */
.heart {
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  transform: rotate(45deg);
  animation: fadeIn 2s ease forwards, beat 1.2s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  border-radius: 50%;
}

.heart::before { top: -7px; }
.heart::after { left: -7px; }

/* Animaciones */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes beat {
  0%,100% { transform: scale(1) rotate(45deg);}
  50% { transform: scale(1.5) rotate(45deg);}
}

/* Estrellas */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.2;}
  to {opacity: 1;}
}

/* Explosión */
.particle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: pink;
  transform: rotate(45deg);
  pointer-events: none;
}

.particle::before,
.particle::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
}

.particle::before { top: -5px; }
.particle::after { left: -5px; }
</style>
</head>

<body>

<div class="text">molocha ❤️</div>

<script>
// ⭐ Estrellas
for (let i = 0; i < 120; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(star);
}

// 💖 Corazón grande
for (let t = 0; t < Math.PI * 2; t += 0.04) {

  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = 13 * Math.cos(t) 
        - 5 * Math.cos(2 * t) 
        - 2 * Math.cos(3 * t) 
        - Math.cos(4 * t);

  let heart = document.createElement("div");
  heart.className = "heart";

  heart.style.left = (window.innerWidth / 2 + x * 14) + "px";
  heart.style.top = (window.innerHeight / 2 - y * 14) + "px";

  heart.style.animationDelay = (t) + "s";

  document.body.appendChild(heart);
}

// 💥 Explosión al tocar
document.addEventListener("click", function(e) {
  for (let i = 0; i < 20; i++) {
    let p = document.createElement("div");
    p.className = "particle";

    let x = e.clientX;
    let y = e.clientY;

    p.style.left = x + "px";
    p.style.top = y + "px";

    document.body.appendChild(p);

    let angle = Math.random() * 2 * Math.PI;
    let speed = Math.random() * 5 + 2;

    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;

    let life = 60;

    function animate() {
      if (life-- <= 0) {
        p.remove();
        return;
      }
      x += vx;
      y += vy;
      p.style.left = x + "px";
      p.style.top = y + "px";
      p.style.opacity = life / 60;
      requestAnimationFrame(animate);
    }

    animate();
  }
});
</script>

</body>
</html>
